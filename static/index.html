<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patent Drafting Assistant</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --panel-2: #1e222d;
    --border: #2a2f3c;
    --text: #e6e8ee;
    --muted: #9aa3b2;
    --accent: #5b8cff;
    --accent-2: #3a6bdb;
    --user: #24304a;
    --assistant: #1b1f2a;
    --green: #35c07a;
    --yellow: #e2b93b;
    --grey: #626b7d;
    --red: #e26a6a;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5;
  }
  button { font-family: inherit; cursor: pointer; }
  .hidden { display: none !important; }

  /* ---------- Auth ---------- */
  #auth-view {
    display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px;
  }
  .auth-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 32px; width: 100%; max-width: 380px;
  }
  .auth-card h1 { font-size: 20px; margin: 0 0 4px; }
  .auth-card p.sub { color: var(--muted); margin: 0 0 24px; font-size: 13px; }
  .auth-card input {
    width: 100%; padding: 11px 12px; margin-bottom: 12px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px;
  }
  .auth-card input:focus { outline: none; border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-weight: 600; font-size: 14px;
  }
  .btn-primary:hover { background: var(--accent-2); }
  .btn-primary:disabled { opacity: .6; cursor: default; }
  .auth-toggle { text-align: center; margin-top: 16px; color: var(--muted); font-size: 13px; }
  .auth-toggle a { color: var(--accent); cursor: pointer; }
  .auth-error { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 18px; }

  /* ---------- App layout ---------- */
  #app-view { display: flex; height: 100vh; }
  #sidebar {
    width: 280px; min-width: 280px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .sidebar-head { padding: 16px; border-bottom: 1px solid var(--border); }
  .brand { font-weight: 700; font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .brand .logo { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg,var(--accent),#8f6bff); }
  .btn-new {
    width: 100%; padding: 10px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-weight: 600; font-size: 13px;
  }
  .btn-new:hover { border-color: var(--accent); }
  .session-list { flex: 1; overflow-y: auto; padding: 8px; }
  .session-item {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent;
  }
  .session-item:hover { background: var(--panel-2); }
  .session-item.active { background: var(--panel-2); border-color: var(--border); }
  .session-item .title { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: var(--green); } .dot.yellow { background: var(--yellow); }
  .dot.grey { background: var(--grey); } .dot.red { background: var(--red); }
  .sidebar-foot { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-foot a { color: var(--accent); cursor: pointer; }

  /* ---------- Main ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 56px; min-height: 56px; border-bottom: 1px solid var(--border); display: flex;
    align-items: center; padding: 0 20px; gap: 12px; background: var(--panel);
  }
  .topbar .t-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .status-pill { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted);
    background: var(--panel-2); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); }

  .chat-scroll { flex: 1; overflow-y: auto; padding: 24px 0; }
  .chat-inner { max-width: 820px; margin: 0 auto; padding: 0 24px; }

  .empty-state { text-align: center; color: var(--muted); margin-top: 60px; }
  .empty-state h2 { color: var(--text); font-weight: 600; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px; text-align: center;
    color: var(--muted); background: var(--panel); margin-bottom: 16px; transition: border-color .15s;
  }
  .upload-zone.drag { border-color: var(--accent); background: var(--panel-2); }
  .upload-zone strong { color: var(--text); }
  .upload-zone .hint { font-size: 12px; margin-top: 6px; }
  .doc-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; justify-content: center; }
  .doc-chip { background: var(--panel-2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text); }
  .doc-chip .type { color: var(--accent); font-weight: 600; text-transform: uppercase; font-size: 10px; }

  /* Extraction progress card */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
  .card h3 { margin: 0 0 12px; font-size: 14px; }
  .prog-step { font-size: 13px; padding: 4px 0; color: var(--text); }
  .prog-step.pending { color: var(--muted); }
  .summary-box { font-size: 13.5px; line-height: 1.6; }

  /* Section buttons */
  .section-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .section-btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
  }
  .section-btn:hover { border-color: var(--accent); color: #fff; }
  .section-btn.done { border-color: var(--green); }
  .section-btn.done::after { content: " ✓"; color: var(--green); }

  /* Messages */
  .msg { display: flex; margin-bottom: 18px; }
  .msg.user { justify-content: flex-end; }
  .bubble { max-width: 88%; padding: 12px 16px; border-radius: 14px; font-size: 14.5px; overflow-wrap: anywhere; }
  .msg.user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--assistant); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .role-tag { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .bubble p { margin: 0 0 10px; } .bubble p:last-child { margin-bottom: 0; }
  .bubble h1,.bubble h2,.bubble h3 { margin: 12px 0 8px; line-height: 1.3; }
  .bubble h1 { font-size: 18px; } .bubble h2 { font-size: 16px; } .bubble h3 { font-size: 14.5px; }
  .bubble ul,.bubble ol { margin: 0 0 10px; padding-left: 22px; }
  .bubble li { margin-bottom: 4px; }
  .bubble code { background: #0c0e14; padding: 2px 5px; border-radius: 4px; font-size: 13px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .bubble pre { background: #0c0e14; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 0 0 10px; }
  .bubble pre code { background: none; padding: 0; }
  .bubble strong { font-weight: 700; }
  .cursor { display: inline-block; width: 7px; height: 15px; background: var(--accent); animation: blink 1s steps(1) infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
  .version-tag { font-size: 11px; color: var(--green); margin-top: 6px; }

  /* Composer */
  .composer { border-top: 1px solid var(--border); padding: 14px 24px 18px; background: var(--panel); }
  .composer-inner { max-width: 820px; margin: 0 auto; }
  .refine-tag { font-size: 12px; color: var(--accent); margin-bottom: 8px; display: none; align-items: center; gap: 8px; }
  .refine-tag .x { cursor: pointer; color: var(--muted); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea#chat-input {
    flex: 1; resize: none; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 14.5px; font-family: inherit;
    max-height: 200px; min-height: 46px; line-height: 1.45;
  }
  textarea#chat-input:focus { outline: none; border-color: var(--accent); }
  .btn-send { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0 18px; height: 46px; font-weight: 600; }
  .btn-send:hover { background: var(--accent-2); }
  .btn-send:disabled { opacity: .5; cursor: default; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--red);
    color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,.4); }
  ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<!-- ================= AUTH ================= -->
<div id="auth-view">
  <div class="auth-card">
    <h1 id="auth-title">Welcome back</h1>
    <p class="sub" id="auth-sub">Sign in to your patent drafting workspace</p>
    <div class="auth-error" id="auth-error"></div>
    <input id="auth-username" placeholder="Username" autocomplete="username">
    <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" id="auth-submit">Sign in</button>
    <div class="auth-toggle" id="auth-toggle">
      New here? <a id="auth-switch">Create an account</a>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app-view" class="hidden">
  <div id="sidebar">
    <div class="sidebar-head">
      <div class="brand"><span class="logo"></span> Patent Drafter</div>
      <button class="btn-new" id="btn-new-session">+ New Session</button>
    </div>
    <div class="session-list" id="session-list"></div>
    <div class="sidebar-foot">
      <span id="who"></span>
      <a id="btn-logout">Logout</a>
    </div>
  </div>

  <div id="main">
    <div class="topbar">
      <div class="t-title" id="t-title">Select a session</div>
      <div class="status-pill" id="status-pill"><span class="dot grey"></span><span id="status-text">No documents</span></div>
    </div>

    <div class="chat-scroll" id="chat-scroll">
      <div class="chat-inner" id="chat-inner">
        <div class="empty-state" id="empty-state">
          <h2>No session selected</h2>
          <p>Create a new session and upload your IDF + Claims documents to begin.</p>
        </div>
      </div>
    </div>

    <div class="composer" id="composer" style="display:none;">
      <div class="composer-inner">
        <div class="section-bar" id="section-bar"></div>
        <div class="refine-tag" id="refine-tag">
          Refining: <strong id="refine-name"></strong> <span class="x" id="refine-clear">✕ clear</span>
        </div>
        <div class="input-row">
          <textarea id="chat-input" placeholder="Ask to draft or refine a section…" rows="1"></textarea>
          <button class="btn-send" id="btn-send">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".docx" multiple class="hidden">

<script>
"use strict";
// ============================ State ============================
const API = "";
let token = localStorage.getItem("pd_token") || null;
let username = localStorage.getItem("pd_user") || null;
let authMode = "login";
let currentSession = null;      // {id,title,extraction_status,...}
let sessions = [];
let activeSection = null;       // section_type being refined
let streaming = false;
let documents = [];

const SECTIONS = [
  ["background", "Background"],
  ["summary", "Summary"],
  ["technical_problems", "Technical Problems"],
  ["technical_advantages", "Technical Advantages"],
  ["summary_paraphrasing", "Summary Paraphrasing"],
];

// ============================ Helpers ============================
function $(id) { return document.getElementById(id); }

async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  if (token) opts.headers["Authorization"] = "Bearer " + token;
  if (opts.json !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(opts.json);
    delete opts.json;
  }
  const res = await fetch(API + path, opts);
  if (res.status === 401) { doLogout(); throw new Error("Session expired"); }
  if (!res.ok) {
    let detail = "Request failed";
    try { detail = (await res.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  return res;
}

function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// --- minimal, safe markdown renderer ---
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function renderMarkdown(src) {
  let text = escapeHtml(src);
  const blocks = [];
  // fenced code
  text = text.replace(/```([\s\S]*?)```/g, (m, code) => {
    blocks.push(`<pre><code>${code.replace(/^\n/, "")}</code></pre>`);
    return `␀${blocks.length - 1}␀`;
  });
  const lines = text.split("\n");
  let html = "", listType = null;
  function closeList() { if (listType) { html += `</${listType}>`; listType = null; } }
  for (let raw of lines) {
    const line = raw;
    if (/^␀\d+␀$/.test(line.trim())) { closeList(); html += line.trim(); continue; }
    if (line.trim() === "") { closeList(); continue; }
    let h = line.match(/^(#{1,3})\s+(.*)$/);
    if (h) { closeList(); const lvl = h[1].length; html += `<h${lvl}>${inline(h[2])}</h${lvl}>`; continue; }
    let ul = line.match(/^\s*[-*]\s+(.*)$/);
    let ol = line.match(/^\s*\d+\.\s+(.*)$/);
    if (ul) { if (listType !== "ul") { closeList(); html += "<ul>"; listType = "ul"; } html += `<li>${inline(ul[1])}</li>`; continue; }
    if (ol) { if (listType !== "ol") { closeList(); html += "<ol>"; listType = "ol"; } html += `<li>${inline(ol[1])}</li>`; continue; }
    closeList(); html += `<p>${inline(line)}</p>`;
  }
  closeList();
  html = html.replace(/␀(\d+)␀/g, (m, i) => blocks[i]);
  return html;
}
function inline(s) {
  return s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
}

// ============================ Auth ============================
function showAuth() { $("auth-view").classList.remove("hidden"); $("app-view").classList.add("hidden"); }
function showApp() { $("auth-view").classList.add("hidden"); $("app-view").classList.remove("hidden"); $("who").textContent = username || ""; }

function toggleAuthMode() {
  authMode = authMode === "login" ? "register" : "login";
  $("auth-title").textContent = authMode === "login" ? "Welcome back" : "Create account";
  $("auth-sub").textContent = authMode === "login" ? "Sign in to your patent drafting workspace" : "Set up your drafting workspace";
  $("auth-submit").textContent = authMode === "login" ? "Sign in" : "Create account";
  $("auth-toggle").innerHTML = authMode === "login"
    ? 'New here? <a id="auth-switch">Create an account</a>'
    : 'Have an account? <a id="auth-switch">Sign in</a>';
  $("auth-switch").onclick = toggleAuthMode;
  $("auth-error").textContent = "";
}
$("auth-switch").onclick = toggleAuthMode;

$("auth-submit").onclick = async () => {
  const u = $("auth-username").value.trim();
  const p = $("auth-password").value;
  $("auth-error").textContent = "";
  if (!u || !p) { $("auth-error").textContent = "Enter a username and password"; return; }
  $("auth-submit").disabled = true;
  try {
    const res = await fetch(API + "/api/auth/" + authMode, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || "Failed"); }
    const data = await res.json();
    token = data.access_token; username = data.username;
    localStorage.setItem("pd_token", token); localStorage.setItem("pd_user", username);
    showApp(); await loadSessions();
  } catch (e) { $("auth-error").textContent = e.message; }
  finally { $("auth-submit").disabled = false; }
};
$("auth-password").addEventListener("keydown", e => { if (e.key === "Enter") $("auth-submit").click(); });

function doLogout() {
  token = null; username = null; currentSession = null;
  localStorage.removeItem("pd_token"); localStorage.removeItem("pd_user");
  showAuth();
}
$("btn-logout").onclick = doLogout;

// ============================ Sessions ============================
async function loadSessions() {
  try {
    const res = await api("/api/sessions");
    sessions = await res.json();
    renderSessionList();
  } catch (e) { toast(e.message); }
}

function statusClass(s) {
  return s === "complete" ? "green" : s === "in_progress" ? "yellow" : s === "error" ? "red" : "grey";
}

function renderSessionList() {
  const list = $("session-list");
  list.innerHTML = "";
  if (!sessions.length) { list.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:12px;">No sessions yet</div>'; return; }
  for (const s of sessions) {
    const el = document.createElement("div");
    el.className = "session-item" + (currentSession && currentSession.id === s.id ? " active" : "");
    el.innerHTML = `<div class="title">${escapeHtml(s.title)}</div>
      <div class="meta"><span class="dot ${statusClass(s.extraction_status)}"></span>${new Date(s.updated_at + "Z").toLocaleString()}</div>`;
    el.onclick = () => selectSession(s.id);
    list.appendChild(el);
  }
}

$("btn-new-session").onclick = async () => {
  try {
    const res = await api("/api/sessions", { method: "POST", json: {} });
    const s = await res.json();
    sessions.unshift(s);
    renderSessionList();
    await selectSession(s.id);
  } catch (e) { toast(e.message); }
};

async function selectSession(id) {
  try {
    const res = await api("/api/sessions/" + id);
    currentSession = await res.json();
    activeSection = null;
    renderSessionList();
    $("empty-state").classList.add("hidden");
    $("composer").style.display = "block";
    updateRefineTag();
    await refreshSessionView();
  } catch (e) { toast(e.message); }
}

function setStatusPill(status) {
  const map = { complete: ["green", "Extraction complete"], in_progress: ["yellow", "Extracting…"],
    error: ["red", "Extraction error"], none: ["grey", "No documents"] };
  const [cls, txt] = map[status] || map.none;
  $("status-pill").innerHTML = `<span class="dot ${cls}"></span><span id="status-text">${txt}</span>`;
}

async function refreshSessionView() {
  $("t-title").textContent = currentSession.title;
  setStatusPill(currentSession.extraction_status);
  const inner = $("chat-inner");
  inner.innerHTML = "";

  // Documents
  const dres = await api(`/api/sessions/${currentSession.id}/documents`);
  documents = await dres.json();

  // Upload zone shown until extraction has completed.
  if (currentSession.extraction_status !== "complete") {
    inner.appendChild(buildUploadZone());
  }

  // Messages
  const mres = await api(`/api/sessions/${currentSession.id}/messages`);
  const messages = await mres.json();
  for (const m of messages) appendMessage(m.role, m.content, { render: true });

  // Section bar + status
  await refreshSectionBar();
  scrollBottom();
}

// ============================ Upload ============================
function buildUploadZone() {
  const wrap = document.createElement("div");
  wrap.className = "upload-wrap";
  const chips = documents.map(d => `<span class="doc-chip"><span class="type">${d.doc_type || "?"}</span> ${escapeHtml(d.filename)}</span>`).join("");
  wrap.innerHTML = `
    <div class="upload-zone" id="upzone">
      <strong>Drop .docx files here</strong> or click to browse
      <div class="hint">Upload your IDF and Claims documents (max 2 per session)</div>
      <div class="doc-chips">${chips}</div>
    </div>`;
  const zone = wrap.querySelector("#upzone");
  zone.onclick = () => $("file-input").click();
  ["dragover", "dragenter"].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.add("drag"); }));
  ["dragleave", "drop"].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.remove("drag"); }));
  zone.addEventListener("drop", e => { const files = [...e.dataTransfer.files]; handleUpload(files); });
  return wrap;
}

$("file-input").onchange = e => { handleUpload([...e.target.files]); e.target.value = ""; };

async function handleUpload(files) {
  files = files.filter(f => f.name.toLowerCase().endsWith(".docx"));
  if (!files.length) { toast("Only .docx files are supported"); return; }
  const remaining = 2 - documents.length;
  if (files.length > remaining) { toast(`Maximum 2 documents per session (${documents.length} uploaded)`); return; }

  const fd = new FormData();
  files.forEach(f => fd.append("files", f));
  try {
    setStatusPill("in_progress");
    const res = await api(`/api/sessions/${currentSession.id}/upload`, { method: "POST", body: fd });
    await res.json();
    // Refresh docs list
    const dres = await api(`/api/sessions/${currentSession.id}/documents`);
    documents = await dres.json();
    await runExtraction();
  } catch (e) { toast(e.message); setStatusPill(currentSession.extraction_status); }
}

// ============================ Extraction (SSE) ============================
async function runExtraction() {
  const inner = $("chat-inner");
  // Replace upload zone with progress card
  const existing = inner.querySelector(".upload-wrap"); if (existing) existing.remove();
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h3>Processing documents…</h3><div id="prog-steps"></div>`;
  inner.appendChild(card);
  const stepsEl = card.querySelector("#prog-steps");
  scrollBottom();

  setStatusPill("in_progress");
  try {
    const res = await api(`/api/sessions/${currentSession.id}/extract`, { method: "POST" });
    await consumeSSE(res, ev => {
      if (ev.type === "progress") {
        const d = document.createElement("div"); d.className = "prog-step"; d.textContent = ev.message;
        stepsEl.appendChild(d); scrollBottom();
      } else if (ev.type === "complete") {
        card.querySelector("h3").textContent = "Extraction complete";
        const box = document.createElement("div"); box.className = "summary-box";
        box.style.marginTop = "10px";
        box.innerHTML = renderMarkdown(ev.summary + "\n\nWhat would you like me to draft? Use the buttons below.");
        card.appendChild(box);
        currentSession.extraction_status = "complete";
        setStatusPill("complete");
      } else if (ev.type === "error") {
        toast("Extraction error: " + ev.message);
      }
    });
    await loadSessions();
    await refreshSectionBar();
  } catch (e) {
    toast("Extraction failed: " + e.message);
    setStatusPill("error");
  }
}

async function consumeSSE(res, onEvent) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buffer.indexOf("\n\n")) !== -1) {
      const chunk = buffer.slice(0, idx); buffer = buffer.slice(idx + 2);
      const line = chunk.split("\n").find(l => l.startsWith("data:"));
      if (!line) continue;
      const payload = line.slice(5).trim();
      if (!payload) continue;
      try { onEvent(JSON.parse(payload)); } catch (e) {}
    }
  }
}

// ============================ Section bar ============================
async function refreshSectionBar() {
  const bar = $("section-bar");
  bar.innerHTML = "";
  if (!currentSession || currentSession.extraction_status !== "complete") return;

  let generated = [];
  try { generated = await (await api(`/api/sessions/${currentSession.id}/sections`)).json(); } catch (e) {}
  const doneTypes = new Set(generated.map(g => g.section_type));

  for (const [type, label] of SECTIONS) {
    const b = document.createElement("button");
    b.className = "section-btn" + (doneTypes.has(type) ? " done" : "");
    b.textContent = label;
    b.onclick = () => generateSection(type, label);
    bar.appendChild(b);
  }
}

function generateSection(type, label) {
  if (streaming) return;
  activeSection = type;
  updateRefineTag();
  sendMessage(`Generate the ${label} section for this invention.`, type);
}

// ============================ Chat ============================
function updateRefineTag() {
  const tag = $("refine-tag");
  if (activeSection) {
    const label = (SECTIONS.find(s => s[0] === activeSection) || [null, activeSection])[1];
    $("refine-name").textContent = label;
    tag.style.display = "flex";
  } else { tag.style.display = "none"; }
}
$("refine-clear").onclick = () => { activeSection = null; updateRefineTag(); };

function appendMessage(role, content, opts = {}) {
  const inner = $("chat-inner");
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (role === "assistant") {
    const tag = document.createElement("div"); tag.className = "role-tag"; tag.textContent = "Assistant";
    wrap.appendChild(bubble); wrap.insertBefore(tag, bubble);
  } else {
    wrap.appendChild(bubble);
  }
  if (opts.render) bubble.innerHTML = role === "assistant" ? renderMarkdown(content) : escapeHtml(content).replace(/\n/g, "<br>");
  else bubble.textContent = content;
  inner.appendChild(wrap);
  return bubble;
}

function scrollBottom() { const s = $("chat-scroll"); s.scrollTop = s.scrollHeight; }

const input = $("chat-input");
input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 200) + "px"; });
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); $("btn-send").click(); }
});
$("btn-send").onclick = () => {
  const msg = input.value.trim();
  if (!msg || streaming || !currentSession) return;
  input.value = ""; input.style.height = "auto";
  sendMessage(msg, activeSection);
};

async function sendMessage(message, sectionType) {
  if (streaming || !currentSession) return;
  streaming = true; $("btn-send").disabled = true;

  appendMessage("user", message, { render: true });
  scrollBottom();
  const bubble = appendMessage("assistant", "", { render: false });
  bubble.innerHTML = '<span class="cursor"></span>';
  let full = "";

  try {
    const res = await api(`/api/sessions/${currentSession.id}/chat`, {
      method: "POST", json: { message, section_type: sectionType || null },
    });
    await consumeSSE(res, ev => {
      if (ev.type === "token") {
        full += ev.content;
        bubble.innerHTML = renderMarkdown(full) + '<span class="cursor"></span>';
        scrollBottom();
      } else if (ev.type === "meta") {
        if (ev.blocked) { /* block message will stream as tokens */ }
      } else if (ev.type === "error") {
        toast("Model error: " + ev.message);
      } else if (ev.type === "done") {
        bubble.innerHTML = renderMarkdown(full);
        if (ev.section_version) {
          const v = document.createElement("div"); v.className = "version-tag";
          v.textContent = `Saved as version ${ev.section_version}`;
          bubble.parentElement.appendChild(v);
        }
      }
    });
  } catch (e) {
    bubble.innerHTML = renderMarkdown(full) + `\n\n_Error: ${escapeHtml(e.message)}_`;
    toast(e.message);
  } finally {
    streaming = false; $("btn-send").disabled = false;
    await refreshSectionBar();
    await loadSessions();
    scrollBottom();
  }
}

// ============================ Boot ============================
(function init() {
  if (token && username) { showApp(); loadSessions(); }
  else { showAuth(); }
})();
</script>
